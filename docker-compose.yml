services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ratelimiter:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - REDIS_ADDR=redis:6379
      - PORT=50051
    depends_on:
      redis:
        condition: service_healthy